name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --no-deps -e .

      - name: Run test suite (includes an end-to-end pipeline run)
        run: pytest -v

      - name: Smoke-test the CLI on a tiny dataset
        run: python -c "from gym_winback.config import load_config; load_config()"
